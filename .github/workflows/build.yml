name: Build and Package Ardour

on:
  push:
    branches: [ main, master ]
    tags: 
    - "*"
  pull_request:
    branches: [ main, master ]
  # This enables manual triggers
  workflow_dispatch:
    inputs:
      debug_build:
        description: 'Configure with debug symbols?'
        type: boolean
        required: false
        default: false
        
jobs:
  build:
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Switch to Latest Tag
      id: tag_getting
      run: |
        LATEST_TAG=$(git describe --tags --abbrev=0)
        echo "Checking out latest tag: $LATEST_TAG"
        git checkout $LATEST_TAG
        echo "version=${LATEST_TAG}" >> $GITHUB_OUTPUT

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo add-apt-repository -y -s "deb http://archive.ubuntu.com/ubuntu/ $(lsb_release -sc) main universe restricted multiverse"
        sudo add-apt-repository -y -s "deb http://archive.ubuntu.com/ubuntu/ $(lsb_release -sc)-updates main universe restricted multiverse"
        sudo apt-get update

        sudo apt-get build-dep ardour
        sudo apt install -y build-essential git python3 pkg-config libasound2-dev libjack-jackd2-dev libglib2.0-dev libglibmm-2.4-dev libsndfile1-dev \
        libcurl4-gnutls-dev \
        libarchive-dev \
        liblo-dev \
        libtag1-dev \
        vamp-plugin-sdk \
        librubberband-dev \
        libudev-dev \
        libfftw3-dev \
        libaubio-dev \
        libxml2-dev \
        liblrdf0-dev \
        libsamplerate-dev \
        lv2-dev \
        libserd-dev \
        libsord-dev \
        libsratom-dev \
        liblilv-dev \
        libgtkmm-2.4-dev \
        libpulse-dev \
        libwebsockets-dev
        
        sudo apt-get install -y libjpeg-dev
        sudo apt-get install -y alien

    - name: Install FPM (Package Builder)
      run: |
        sudo gem install --no-document fpm

    - name: Configure Ardour
      # Uses the inputs from the manual trigger. If run automatically (on push/PR), 
      # it defaults to the fallback values.
      run: |
        CONFIGURE_FLAGS="--prefix=/usr"
        if [ "${{ github.event.inputs.debug_build }}" = "true" ]; then
          CONFIGURE_FLAGS="$CONFIGURE_FLAGS --debug"
        fi
        ./waf configure $CONFIGURE_FLAGS

    - name: Build Ardour
      run: ./waf build -j$(nproc)

    - name: Stage Installation to Temporary Directory
      run: |
        mkdir -p staging
        DESTDIR=$(pwd)/staging ./waf install

    - name: Package into .deb using FPM
      # Dynamically sets the version using either your manual input or the default value
      run: |
        
        fpm -s dir -t deb \
          -n "ardour" \
          -v "${{ steps.tag_getting.outputs.version }}" \
          --iteration "1" \
          -C staging \
          --description "Custom built Ardour DAW" \
          --maintainer "vophanphuochai2003 <vophanphuochai2003@gmail.com>" \
          --depends "libc6" \
          --depends "libjack-jackd2-0" \
          --depends "libasound2"
          
        fpm -s dir -t rpm \
          -n "ardour" \
          -v "${{ steps.tag_getting.outputs.version }}" \
          --iteration "1" \
          -C staging \
          --description "Custom built Ardour DAW" \
          --maintainer "vophanphuochai2003 <vophanphuochai2003@gmail.com>" \
          --depends "glibc6" \
          --depends "jack-audio-connection-kit" \
          --depends "alsa-lib"

    - name: Upload Debian Package as Artifact
      uses: actions/upload-artifact@v7
      with:
        name: ardour-deb-package
        path: ./*.deb
        archive: false 
    - name: Upload Red Hat Package as Artifact
      uses: actions/upload-artifact@v7
      with:
        name: ardour-rpm-package
        path: ./*.rpm
        archive: false 
    - name: Create GitHub Release and Upload Deb Package
      uses: softprops/action-gh-release@v2
      if: ${{ github.ref_type == 'tag' }}
      with:
        # The tag name to associate the release with (e.g., "9.7.0")
        tag_name: ${{ steps.tag_getting.outputs.version }}
        
        # The title of the release
        name: Release ${{ steps.tag_getting.outputs.version }}
        
        # Optional release notes/description
        body: |
          Automated compilation of upstream Ardour version ${{ steps.tag_getting.outputs.version }}.
          Install with: `sudo dpkg -i custom-ardour_*.deb`
          
        # Path to the file(s) you want to upload. Supports glob patterns.
        files: |
          ./*.deb
          ./*.rpm
        
        # Authenticates the release creation (built-in GitHub secret)
        token: ${{ secrets.GITHUB_TOKEN }}
